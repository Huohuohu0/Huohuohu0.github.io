  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: #f7f7f7;
      color: #222;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
                   "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      height: 64px;
      background: #fff;
      border-bottom: 1px solid #ececec;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
    }
    .topbar .left, .topbar .right {
      position: absolute;
      top: 0;
      height: 64px;
      display: flex;
      align-items: center;
      color: #222;
    }
    .topbar .left { left: 16px; font-size: 28px; }
    .topbar .right { right: 16px; font-size: 24px; letter-spacing: 1px; }
    .title-wrap { text-align: center; line-height: 1.15; }
    .title { font-size: 18px; font-weight: 600; margin-bottom: 2px; }
    .sub { font-size: 11px; color: #666; }
    .page {
      max-width: 430px;
      margin: 0 auto;
      background: #fff;
      min-height: calc(100vh - 64px);
      padding: 18px 18px 40px;
    }
    .clock {
      text-align: center;
      color: #2f7d0b;
      font-size: 26px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: 0;
      margin: 8px 0 18px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC",
                   "Microsoft YaHei", Arial, sans-serif;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
      white-space: nowrap;
    }
    .qr-wrap {
      display: flex;
      justify-content: center;
      margin: 0 0 14px;
    }
    .qr-box {
      width: 250px;
      height: 250px;
      background: #fff;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qr {
      width: 250px;
      height: 250px;
      display: block;
      object-fit: cover;
      background: #fff;
    }
    .name {
      text-align: center;
      font-size: 30px;
      line-height: 1.2;
      color: #2f7d0b;
      font-weight: 700;
      margin: 2px 0 24px;
    }
    .info {
      display: grid;
      grid-template-columns: 110px 1fr;
      row-gap: 18px;
      column-gap: 6px;
      font-size: 18px;
      line-height: 1.5;
    }
    .label { font-weight: 700; color: #222; }
    .value { color: #1e78e6; word-break: break-all; }
    .section-title {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      margin: 34px 0 18px;
      color: #222;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 18px;
      text-align: center;
    }
    th, td { padding: 10px 6px; border: none; word-break: break-all; }
    th { font-weight: 700; color: #222; }
    .record {
      border: 2px solid #222;
      border-radius: 18px;
      padding: 14px 14px 10px;
      font-size: 18px;
      line-height: 1.7;
      color: #222;
      margin-top: 8px;
    }
    .footer-nav {
      display: flex;
      justify-content: center;
      gap: 70px;
      color: #666;
      font-size: 36px;
      margin-top: 26px;
      user-select: none;
    }
  </style>
